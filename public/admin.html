<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Admin Kelulusan</title>

<!-- NO CACHE -->
<meta
  http-equiv="Cache-Control"
  content="no-cache, no-store, must-revalidate"
/>

<meta
  http-equiv="Pragma"
  content="no-cache"
/>

<meta
  http-equiv="Expires"
  content="0"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(
    135deg,
    #1e3c72,
    #2a5298
  );
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  margin-bottom:20px;
}

.title{
  text-align:center;
  font-size:30px;
  font-weight:bold;
  color:#1e3c72;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:25px;
}

.school-info{
  text-align:center;
  margin-bottom:20px;
}

.school-logo{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:20px;
  border:4px solid #1e3c72;
  margin-bottom:10px;
}

.school-name{
  font-size:20px;
  font-weight:bold;
  color:#1e3c72;
}

input,
select{
  width:100%;
  padding:14px;
  border:2px solid #ddd;
  border-radius:12px;
  margin-bottom:15px;
  font-size:16px;
}

input:focus,
select:focus{
  outline:none;
  border-color:#1e3c72;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1e3c72;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
  transition:0.3s;
}

button:hover{
  background:#16325c;
}

.btn-warning{
  background:#ff9500;
}

.btn-danger{
  background:#ff3b30;
}

.btn-success{
  background:#34c759;
}

.student-card{
  border:1px solid #ddd;
  border-radius:15px;
  padding:20px;
  margin-bottom:15px;
}

.student-card h3{
  color:#1e3c72;
  margin-bottom:10px;
}

.student-card p{
  margin-bottom:5px;
  color:#444;
}

.message{
  display:none;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

.success{
  background:#e7ffe7;
  border:2px solid #34c759;
  color:#155724;
}

.fail{
  background:#ffe7e7;
  border:2px solid #ff3b30;
  color:#721c24;
}

.upload-box{
  background:#34c759;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.template-link{
  margin-top:10px;
}

.template-link a{
  color:white;
  text-decoration:underline;
  cursor:pointer;
}

.total-data{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  color:#1e3c72;
}

.logo-box{
  background:#f4f7ff;
  border:2px dashed #1e3c72;
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
}

.logo-title{
  font-weight:bold;
  color:#1e3c72;
  margin-bottom:10px;
  text-align:center;
}

.preview-logo{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:15px;
  display:block;
  margin:auto;
  margin-top:10px;
  border:3px solid #1e3c72;
}

@media(max-width:600px){

  .card{
    padding:20px;
  }

  .title{
    font-size:24px;
  }
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
ADMIN KELULUSAN
</div>

<div class="subtitle">
Tambah, Edit, dan Hapus Data
</div>

<div
  id="schoolInfo"
  class="school-info"
>

<img
  id="schoolLogo"
  class="school-logo"
  src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
/>

<div
  id="schoolName"
  class="school-name"
>
Loading sekolah...
</div>

</div>

<!-- UPLOAD LOGO -->

<div class="logo-box">

<div class="logo-title">
Upload Logo Sekolah
</div>

<input
  type="file"
  id="logoInput"
  accept="image/*"
/>

<button onclick="uploadLogo()">
Upload Logo
</button>

<img
  id="previewLogo"
  class="preview-logo"
  style="display:none;"
/>

</div>

<input
  type="text"
  id="nisn"
  placeholder="NISN"
/>

<input
  type="text"
  id="nama"
  placeholder="Nama Siswa"
/>

<input
  type="text"
  id="kelas"
  placeholder="Kelas"
/>

<select id="status">

<option value="LULUS">
LULUS
</option>

<option value="TIDAK LULUS">
TIDAK LULUS
</option>

</select>

<button
  id="saveBtn"
  onclick="tambahSiswa()"
>
Simpan Data
</button>

<div class="upload-box">

<input
  type="file"
  id="excelFile"
  accept=".xlsx,.xls"
/>

<button onclick="uploadExcel()">
Upload Excel
</button>

<div class="template-link">

<a onclick="downloadTemplate()">
Download Template Excel
</a>

</div>

</div>

<button
  class="btn-success"
  onclick="loadStudents()"
>
Tampilkan Semua Data
</button>

<button
  class="btn-danger"
  onclick="hapusSemuaData()"
>
Hapus Semua Data
</button>

<button
  class="btn-danger"
  onclick="logout()"
>
Logout
</button>

<div
  id="totalData"
  class="total-data"
>
Total Siswa: 0
</div>

<div
  id="message"
  class="message"
></div>

</div>

<div
  id="studentList"
  class="card"
>

<div class="subtitle">
Klik tombol "Tampilkan Semua Data"
untuk melihat data siswa
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

const BASE_URL = '/api'

const token =
  localStorage.getItem('token')

let editId = null

// ======================
// CHECK LOGIN
// ======================

async function checkLogin(){

  if(!token){

    window.location.replace(
      '/index.html'
    )

    return
  }

  const school =
    localStorage.getItem(
      'school'
    )

  const logo =
    localStorage.getItem(
      'schoolLogo'
    )

  if(school){

    document
      .getElementById(
        'schoolName'
      )
      .innerHTML =
        school
  }

  if(logo){

    document
      .getElementById(
        'schoolLogo'
      )
      .src = logo
  }

  try{

    const response = await fetch(
      `${BASE_URL}/students`,
      {
        headers:{
          Authorization:
            `Bearer ${token}`
        }
      }
    )

    if(response.status === 401){

      logout()
    }

  }catch(err){

    logout()
  }
}

checkLogin()

// ======================
// BLOCK BACK/FORWARD
// ======================

window.addEventListener(
  'pageshow',
  function(){

    checkLogin()

  }
)

// ======================
// SHOW MESSAGE
// ======================

function showMessage(
  text,
  success
){

  const message =
    document.getElementById(
      'message'
    )

  message.style.display =
    'block'

  message.className =
    success
      ? 'message success'
      : 'message fail'

  message.innerHTML = text
}

// ======================
// RESET FORM
// ======================

function resetForm(){

  editId = null

  document
    .getElementById('nisn')
    .value = ''

  document
    .getElementById('nama')
    .value = ''

  document
    .getElementById('kelas')
    .value = ''

  document
    .getElementById('status')
    .value = 'LULUS'

  document
    .getElementById('saveBtn')
    .innerHTML = 'Simpan Data'
}

// ======================
// LOAD STUDENTS
// ======================

async function loadStudents(){

  const studentList =
    document.getElementById(
      'studentList'
    )

  studentList.innerHTML = `
    <div class="subtitle">
      Loading...
    </div>
  `

  try{

    const response = await fetch(
      `${BASE_URL}/students`,
      {
        headers:{
          Authorization:
            `Bearer ${token}`
        }
      }
    )

    if(response.status === 401){

      logout()
      return
    }

    const students =
      await response.json()

    document
      .getElementById(
        'totalData'
      )
      .innerHTML =
        `Total Siswa: ${students.length}`

    if(students.length === 0){

      studentList.innerHTML = `
        <div class="subtitle">
          Tidak ada data siswa
        </div>
      `

      return
    }

    studentList.innerHTML = ''

    students.forEach(student=>{

      studentList.innerHTML += `

      <div class="student-card">

        <h3>
          ${student.nama}
        </h3>

        <p>
          <b>NISN:</b>
          ${student.nisn}
        </p>

        <p>
          <b>Kelas:</b>
          ${student.kelas}
        </p>

        <p>
          <b>Status:</b>
          ${student.status}
        </p>

        <button
          class="btn-warning"
          onclick="editStudent(
            '${student.nisn}',
            '${student.nisn}',
            '${student.nama}',
            '${student.kelas}',
            '${student.status}'
          )"
        >
          Edit
        </button>

        <button
          class="btn-danger"
          onclick="deleteStudent(
            '${student.nisn}'
          )"
        >
          Hapus
        </button>

      </div>

      `
    })

  }catch(err){

    console.log(err)

    studentList.innerHTML = `
      <div class="subtitle">
        Gagal mengambil data
      </div>
    `
  }
}

// ======================
// ADD / UPDATE
// ======================

async function tambahSiswa(){

  const nisn =
    document.getElementById(
      'nisn'
    ).value

  const nama =
    document.getElementById(
      'nama'
    ).value

  const kelas =
    document.getElementById(
      'kelas'
    ).value

  const status =
    document.getElementById(
      'status'
    ).value

  if(!nisn || !nama || !kelas){

    showMessage(
      'Semua field wajib diisi',
      false
    )

    return
  }

  try{

    let response

    if(editId){

      response = await fetch(
        `${BASE_URL}/students/${editId}`,
        {
          method:'PUT',

          headers:{
            'Content-Type':
              'application/json',

            Authorization:
              `Bearer ${token}`
          },

          body:JSON.stringify({
            nisn,
            nama,
            kelas,
            status
          })
        }
      )

    }else{

      response = await fetch(
        `${BASE_URL}/students`,
        {
          method:'POST',

          headers:{
            'Content-Type':
              'application/json',

            Authorization:
              `Bearer ${token}`
          },

          body:JSON.stringify({
            nisn,
            nama,
            kelas,
            status
          })
        }
      )
    }

    const result =
      await response.json()

    showMessage(
      result.message,
      response.ok
    )

    if(response.ok){

      resetForm()

      loadStudents()
    }

  }catch(err){

    showMessage(
      'Server Error',
      false
    )
  }
}

// ======================
// EDIT
// ======================

function editStudent(
  id,
  nisn,
  nama,
  kelas,
  status
){

  editId = id

  document
    .getElementById('nisn')
    .value = nisn

  document
    .getElementById('nama')
    .value = nama

  document
    .getElementById('kelas')
    .value = kelas

  document
    .getElementById('status')
    .value = status

  document
    .getElementById('saveBtn')
    .innerHTML = 'Update Data'

  window.scrollTo({
    top:0,
    behavior:'smooth'
  })
}

// ======================
// DELETE
// ======================

async function deleteStudent(id){

  const confirmDelete =
    confirm(
      'Yakin ingin menghapus data?'
    )

  if(!confirmDelete){
    return
  }

  try{

    const response = await fetch(
      `${BASE_URL}/students/${id}`,
      {
        method:'DELETE',

        headers:{
          Authorization:
            `Bearer ${token}`
        }
      }
    )

    const result =
      await response.json()

    alert(result.message)

    loadStudents()

  }catch(err){

    alert('Server Error')
  }
}

// ======================
// DELETE ALL
// ======================

async function hapusSemuaData(){

  const confirmDelete =
    confirm(
      'Hapus semua data siswa?'
    )

  if(!confirmDelete){
    return
  }

  try{

    const response = await fetch(
      `${BASE_URL}/students/all`,
      {
        method:'DELETE',

        headers:{
          Authorization:
            `Bearer ${token}`
        }
      }
    )

    const result =
      await response.json()

    alert(result.message)

    loadStudents()

  }catch(err){

    alert('Server Error')
  }
}

// ======================
// UPLOAD EXCEL
// ======================

async function uploadExcel(){

  const fileInput =
    document.getElementById(
      'excelFile'
    )

  const file =
    fileInput.files[0]

  if(!file){

    alert(
      'Pilih file excel'
    )

    return
  }

  const formData =
    new FormData()

  formData.append(
    'file',
    file
  )

  try{

    const response = await fetch(
      `${BASE_URL}/upload-excel`,
      {
        method:'POST',

        headers:{
          Authorization:
            `Bearer ${token}`
        },

        body:formData
      }
    )

    const result =
      await response.json()

    alert(result.message)

    fileInput.value = ''

    loadStudents()

  }catch(err){

    alert('Server Error')
  }
}

// ======================
// TEMPLATE XLSX
// ======================

function downloadTemplate(){

  const data = [

    {
      nisn:'12345',
      nama:'Andi',
      kelas:'XII IPA 1',
      status:'LULUS'
    },

    {
      nisn:'67890',
      nama:'Budi',
      kelas:'XII IPA 2',
      status:'TIDAK LULUS'
    }

  ]

  const worksheet =
    XLSX.utils.json_to_sheet(
      data
    )

  const workbook =
    XLSX.utils.book_new()

  XLSX.utils.book_append_sheet(
    workbook,
    worksheet,
    'Data Siswa'
  )

  XLSX.writeFile(
    workbook,
    'template_data_siswa.xlsx'
  )
}

// ======================
// UPLOAD LOGO
// ======================

function uploadLogo(){

  const file =
    document.getElementById(
      'logoInput'
    ).files[0]

  if(!file){

    alert(
      'Pilih logo terlebih dahulu'
    )

    return
  }

  const reader =
    new FileReader()

  reader.onload = function(e){

    const logo =
      e.target.result

    localStorage.setItem(
      'schoolLogo',
      logo
    )

    document
      .getElementById(
        'schoolLogo'
      )
      .src = logo

    const preview =
      document.getElementById(
        'previewLogo'
      )

    preview.src = logo

    preview.style.display =
      'block'

    alert(
      'Logo berhasil diupload'
    )
  }

  reader.readAsDataURL(file)
}

// ======================
// LOGOUT
// ======================

function logout(){

  localStorage.removeItem(
    'token'
  )

  localStorage.removeItem(
    'school'
  )

  localStorage.removeItem(
    'schoolLogo'
  )

  window.location.replace(
    '/index.html'
  )
}

</script>

</body>
</html>
