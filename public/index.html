<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Pengumuman Kelulusan</title>

<!-- NO CACHE -->
<meta
  http-equiv="Cache-Control"
  content="no-cache, no-store, must-revalidate"
>

<meta
  http-equiv="Pragma"
  content="no-cache"
>

<meta
  http-equiv="Expires"
  content="0"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(
    135deg,
    #1e3c72,
    #2a5298
  );
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
}

.card{
  background:#fff;
  padding:35px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

.title{
  font-size:32px;
  font-weight:bold;
  color:#1e3c72;
  margin-bottom:10px;
}

.subtitle{
  color:#666;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:14px;
  border:2px solid #ddd;
  border-radius:12px;
  margin-bottom:15px;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:#1e3c72;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1e3c72;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#16325c;
}

.result{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  display:none;
}

.success{
  background:#e7ffe7;
  border:2px solid #34c759;
  color:#155724;
}

.fail{
  background:#ffe7e7;
  border:2px solid #ff3b30;
  color:#721c24;
}

.nama{
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}

.kelas{
  font-size:18px;
  margin-bottom:10px;
}

.status{
  font-size:30px;
  font-weight:bold;
}

.admin-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:auto;
  padding:12px 20px;
  background:#fff;
  color:#1e3c72;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content{
  background:#fff;
  width:100%;
  max-width:450px;
  padding:30px;
  border-radius:20px;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:30px;
  cursor:pointer;
}

.hidden{
  display:none;
}

.section-title{
  font-size:24px;
  font-weight:bold;
  color:#1e3c72;
  margin-bottom:20px;
  text-align:center;
}

.register-btn{
  background:#34c759;
  margin-top:10px;
}

.register-btn:hover{
  background:#28a745;
}

@media(max-width:500px){

  .card{
    padding:25px;
  }

  .title{
    font-size:26px;
  }

  .status{
    font-size:24px;
  }
}

</style>

</head>

<body>

<button
  class="admin-btn"
  onclick="openLogin()"
>
Admin Login
</button>

<div class="container">

<div class="card">

<div class="title">
PENGUMUMAN KELULUSAN
</div>

<div class="subtitle">
Masukkan data untuk melihat hasil kelulusan
</div>

<input
  type="text"
  id="school"
  placeholder="Nama Sekolah"
>

<input
  type="text"
  id="nisn"
  placeholder="Masukkan NISN"
>

<button onclick="cekKelulusan()">
Cek Kelulusan
</button>

<div
  id="result"
  class="result"
></div>

</div>

</div>

<!-- LOGIN MODAL -->

<div
  id="loginModal"
  class="modal hidden"
>

<div class="modal-content">

<span
  class="close"
  onclick="closeLogin()"
>
&times;
</span>

<div class="section-title">
Login Admin
</div>

<input
  type="text"
  id="username"
  placeholder="Username"
>

<input
  type="password"
  id="password"
  placeholder="Password"
>

<button onclick="loginAdmin()">
Login
</button>

<button
  class="register-btn"
  onclick="window.location.href='/register.html'"
>
Daftar Admin / Sekolah
</button>

</div>

</div>

<script>

const BASE_URL = '/api'

// ======================
// OPEN LOGIN
// ======================

function openLogin(){

  document
    .getElementById(
      'loginModal'
    )
    .classList.remove(
      'hidden'
    )
}

// ======================
// CLOSE LOGIN
// ======================

function closeLogin(){

  document
    .getElementById(
      'loginModal'
    )
    .classList.add(
      'hidden'
    )
}

// ======================
// CEK KELULUSAN
// ======================

async function cekKelulusan(){

  const school =
    document
      .getElementById(
        'school'
      )
      .value
      .trim()

  const nisn =
    document
      .getElementById(
        'nisn'
      )
      .value
      .trim()

  const result =
    document.getElementById(
      'result'
    )

  if(!school || !nisn){

    result.style.display =
      'block'

    result.className =
      'result fail'

    result.innerHTML = `
      <div class="status">
      Lengkapi data terlebih dahulu
      </div>
    `

    return
  }

  try{

    const response = await fetch(

      `${BASE_URL}/students/${nisn}?school=${school}`

    )

    const data =
      await response.json()

    if(!response.ok){

      result.style.display =
        'block'

      result.className =
        'result fail'

      result.innerHTML = `
        <div class="status">
        ${data.message}
        </div>
      `

      return
    }

    const isLulus =
      data.status === 'LULUS'

    result.style.display =
      'block'

    result.className =
      isLulus
        ? 'result success'
        : 'result fail'

    result.innerHTML = `

      <div class="nama">
      ${data.nama}
      </div>

      <div class="kelas">
      ${data.kelas}
      </div>

      <div class="status">
      ${data.status}
      </div>

    `

  }catch(err){

    result.style.display =
      'block'

    result.className =
      'result fail'

    result.innerHTML = `
      <div class="status">
      Server Error
      </div>
    `
  }
}

// ======================
// LOGIN ADMIN
// ======================

async function loginAdmin(){

  const username =
    document
      .getElementById(
        'username'
      )
      .value
      .trim()

  const password =
    document
      .getElementById(
        'password'
      )
      .value
      .trim()

  if(!username || !password){

    alert(
      'Username dan password wajib diisi'
    )

    return
  }

  try{

    const response = await fetch(
      `${BASE_URL}/login`,
      {
        method:'POST',

        headers:{
          'Content-Type':
            'application/json'
        },

        body:JSON.stringify({
          username,
          password
        })
      }
    )

    const data =
      await response.json()

    if(!response.ok){

      alert(data.message)
      return
    }

    localStorage.setItem(
      'token',
      data.token
    )

    localStorage.setItem(
      'school',
      data.school
    )

    alert('Login berhasil')

    window.location.replace(
      '/admin.html'
    )

  }catch(err){

    alert('Server Error')
  }
}

// ENTER LOGIN
document
  .getElementById(
    'password'
  )
  .addEventListener(
    'keypress',
    function(e){

      if(e.key === 'Enter'){
        loginAdmin()
      }
    }
  )

// ENTER CEK
document
  .getElementById(
    'nisn'
  )
  .addEventListener(
    'keypress',
    function(e){

      if(e.key === 'Enter'){
        cekKelulusan()
      }
    }
  )

</script>

</body>
</html>
